[package]
name = "arch"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
config = { path = "../config" }
async-utils = { path = "../crates/async-utils/" }
sbi-print = { path = "../crates/sbi-print/" }



riscv = "0.13"
sbi-rt = "0.0.3"
log = "0.4"
buddy_system_allocator = "0.11"
linked_list_allocator = "0.10"
bitflags = "2.9"
bitmap-allocator = { git = "https://github.com/rcore-os/bitmap-allocator" }
crate_interface = "0.1"

[features]
default = ["irq","buddy"]
# Kernel interrupt
irq = []
buddy = []
linked = []
